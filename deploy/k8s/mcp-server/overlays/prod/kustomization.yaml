apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

patches:
  # Prod: higher resources for MCP server container
  - target:
      kind: Deployment
      name: mcp-server-SLUG
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: mcp-server-SLUG
      spec:
        template:
          spec:
            containers:
              - name: mcp-server
                resources:
                  requests:
                    cpu: 250m
                    memory: 256Mi
                  limits:
                    cpu: 500m
                    memory: 512Mi
