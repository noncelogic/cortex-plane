apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-server-SLUG
  namespace: cortex-plane
  labels:
    app.kubernetes.io/managed-by: cortex-plane
    app.kubernetes.io/component: mcp-server
    app.kubernetes.io/part-of: cortex-plane
    cortex.io/mcp-server: SLUG
spec:
  replicas: 1
  selector:
    matchLabels:
      cortex.io/mcp-server: SLUG
  template:
    metadata:
      labels:
        app.kubernetes.io/managed-by: cortex-plane
        app.kubernetes.io/component: mcp-server
        app.kubernetes.io/part-of: cortex-plane
        cortex.io/mcp-server: SLUG
    spec:
      serviceAccountName: mcp-server-SLUG
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 2000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: mcp-server
          image: IMAGE
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              path: /mcp
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /mcp
              port: 3000
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 128Mi
