name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # ── Governance integrity gate ─────────────────────────────────
      - name: Governance validation
        run: pnpm validate:governance

      # ── Quality gates (#488) ──────────────────────────────────────
      - name: Formatting
        run: pnpm format:check

      - name: Lint (includes error-handling rules)
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      # Runs unit tests, schema contract tests (#489), agent lifecycle
      # integration tests (#491), and chat session CRUD tests (#492).
      - name: Tests (unit + schema-contract + integration)
        run: pnpm test
